<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIN Sequencer</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e2937;
      --accent: #1e40af;
      --border: #e2e8f0;
      --perm-bg: #f8fafc;
    }
    body.dark {
      --bg: #0f172a;
      --card: #1e2937;
      --text: #f1f5f9;
      --accent: #3b82f6;
      --border: #334155;
      --perm-bg: #334155;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      transition: background 0.4s;
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    header {
      background: linear-gradient(135deg, var(--accent), #1e3a8a);
      color: white;
      padding: 35px 30px;
      text-align: center;
      position: relative;
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 700;
    }
    .subtitle {
      opacity: 0.95;
      margin-top: 8px;
      font-size: 1.1rem;
    }
    .theme-toggle {
      position: absolute;
      top: 25px;
      right: 30px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-area {
      padding: 40px 30px;
      text-align: center;
    }
    input {
      width: 100%;
      max-width: 420px;
      padding: 18px 24px;
      font-size: 1.3rem;
      border: 2px solid var(--border);
      border-radius: 16px;
      outline: none;
      background: var(--card);
      color: var(--text);
      transition: all 0.3s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 5px rgba(30, 64, 175, 0.15);
    }
    button {
      margin-top: 24px;
      padding: 16px 48px;
      font-size: 1.15rem;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #1e3a8a;
      transform: translateY(-3px);
    }
    .result {
      padding: 30px;
      display: none;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .count {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
    }
    .permutations {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
    }
    .perm-card {
      background: var(--perm-bg);
      border-radius: 16px;
      padding: 20px 16px 12px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .perm-number {
      font-size: 1.55rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 4px;
    }
    .perm-card.strikethrough .perm-number {
      text-decoration: line-through;
      color: #64748b;
    }
    .delete-btn {
      background: #e11d48;
      color: white;
      border: none;
      border-radius: 9999px;
      width: 32px;
      height: 32px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 0 auto;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(225, 29, 72, 0.3);
    }
    .delete-btn:hover {
      background: #be123c;
      transform: scale(1.1);
    }
    .reset-btn {
      padding: 14px 36px;
      background: #64748b;
      font-size: 1.1rem;
    }
    footer {
      text-align: center;
      padding: 25px;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button class="theme-toggle" onclick="toggleDarkMode()">☀️</button>
      <h1>PIN Sequencer</h1>
      <p class="subtitle">Generate all possible digit permutations</p>
    </header>

    <div class="input-area">
      <input type="text" id="digits" placeholder="Enter digits (e.g. 7231)" maxlength="20" autofocus>
      <br>
      <button onclick="generatePermutations()">Generate All Permutations</button>
    </div>

    <div class="result" id="result">
      <div class="result-header">
        <div class="count" id="count"></div>
        <button onclick="resetAll()" class="reset-btn">Reset All</button>
      </div>
      <div class="permutations" id="permutations"></div>
    </div>

    <footer>
      PIN Sequencer • All permutations generated instantly in your browser
    </footer>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const toggleBtn = document.querySelector('.theme-toggle');
      toggleBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }

    function generatePermutations() {
      const input = document.getElementById('digits').value.trim();
      if (!input) {
        alert("Please enter some digits");
        return;
      }

      const digits = input.split('').filter(char => /\d/.test(char));
      if (digits.length === 0) {
        alert("Please enter at least one digit");
        return;
      }

      const permutations = getUniquePermutations(digits);
      
      const container = document.getElementById('permutations');
      container.innerHTML = '';

      permutations.forEach(perm => {
        const card = document.createElement('div');
        card.className = 'perm-card';
        card.innerHTML = `
          <div class="perm-number">${perm}</div>
          <button class="delete-btn" onclick="strikeThrough(this)">×</button>
        `;
        container.appendChild(card);
      });

      document.getElementById('count').textContent = 
        `${permutations.length} unique permutations`;
      
      document.getElementById('result').style.display = 'block';
      window.scrollTo({ top: document.getElementById('result').offsetTop - 100, behavior: 'smooth' });
    }

    function getUniquePermutations(arr) {
      const result = new Set();
      function permute(current, remaining) {
        if (remaining.length === 0) {
          result.add(current);
          return;
        }
        for (let i = 0; i < remaining.length; i++) {
          permute(current + remaining[i], remaining.slice(0, i) + remaining.slice(i + 1));
        }
      }
      permute('', arr.join(''));
      return Array.from(result).sort();
    }

    function strikeThrough(btn) {
      const card = btn.parentElement;
      card.classList.toggle('strikethrough');
    }

    function resetAll() {
      document.getElementById('result').style.display = 'none';
      document.getElementById('digits').value = '';
    }

    // Enter key support
    document.getElementById('digits').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generatePermutations();
    });
  </script>
</body>
</html>
